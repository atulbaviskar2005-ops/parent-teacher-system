<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teacher Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    padding: 20px;
}

.container {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

.box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
    box-shadow: 0px 0px 10px gray;
}

input, select {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
}

button {
    width: 100%;
    padding: 10px;
    background: green;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: darkgreen;
}

h2 {
    text-align: center;
}

p {
    text-align: center;
    font-weight: bold;
}
</style>

</head>

<body>

<h1>Teacher Dashboard</h1>

<div class="container">

    <!-- 📅 Attendance -->
    <div class="box">
        <h2>Mark Attendance</h2>

        <input type="number" id="attStudentId" placeholder="Student ID">
        <input type="date" id="attDate">

        <select id="attStatus">
            <option value="Present">Present</option>
            <option value="Absent">Absent</option>
        </select>

        <button onclick="markAttendance()">Submit</button>

        <p id="attMsg"></p>
    </div>

    <!-- 📝 Marks -->
    <div class="box">
        <h2>Add Marks</h2>

        <input type="number" id="markStudentId" placeholder="Student ID">
        <input type="text" id="subject" placeholder="Subject">
        <input type="number" id="marks" placeholder="Marks">

        <button onclick="addMarks()">Submit</button>

        <p id="markMsg"></p>
    </div>

    <!-- 💬 Message -->
    <div class="box">
        <h2>Send Message</h2>

        <input type="number" id="msgStudentId" placeholder="Student ID">
        <input type="text" id="message" placeholder="Message">

        <button onclick="sendMessage()">Send</button>

        <p id="msgStatus"></p>
    </div>

</div>

<script>

/// 📅 Mark Attendance
function markAttendance() {

    fetch("http://localhost:8080/teacher/attendance", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            studentId: document.getElementById("attStudentId").value,
            date: document.getElementById("attDate").value,
            status: document.getElementById("attStatus").value
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("attMsg").innerText = "Attendance Saved!";
    })
    .catch(err => {
        document.getElementById("attMsg").innerText = "Error Saving Attendance";
    });
}


// 📝 Add Marks
function addMarks() {

    fetch("http://localhost:8080/teacher/marks", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            studentId: document.getElementById("markStudentId").value,
            subject: document.getElementById("subject").value,
            marks: document.getElementById("marks").value
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("markMsg").innerText = "Marks Added!";
    })
    .catch(err => {
        document.getElementById("markMsg").innerText = "Error Adding Marks";
    });
}


// 💬 Send Message
function sendMessage() {

    fetch("http://localhost:8080/teacher/message", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            studentId: document.getElementById("msgStudentId").value,
            content: document.getElementById("message").value
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("msgStatus").innerText = "Message Sent!";
    })
    .catch(err => {
        document.getElementById("msgStatus").innerText = "Error Sending Message";
    });
}

</script>

</body>
</html>
