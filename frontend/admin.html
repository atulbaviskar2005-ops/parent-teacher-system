<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    padding: 20px;
}

.container {
    display: flex;
    gap: 30px;
}

.box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
    box-shadow: 0px 0px 10px gray;
}

input {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
}

button {
    width: 100%;
    padding: 10px;
    background: green;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: darkgreen;
}

h2 {
    text-align: center;
}
</style>

</head>

<body>

<h1>Admin Dashboard</h1>

<div class="container">

    <!-- Add Student -->
    <div class="box">
        <h2>Add Student</h2>

        <input type="text" id="sname" placeholder="Student Name">
        <input type="text" id="sclass" placeholder="Class">
        <input type="text" id="parent" placeholder="Parent Username">

        <button onclick="addStudent()">Add Student</button>

        <p id="msg1"></p>
    </div>

    <!-- Add Teacher -->
    <div class="box">
        <h2>Add Teacher</h2>

        <input type="text" id="tname" placeholder="Teacher Name">
        <input type="text" id="subject" placeholder="Subject">

        <button onclick="addTeacher()">Add Teacher</button>

        <p id="msg2"></p>
    </div>

</div>

<script>

// ➕ Add Student
function addStudent() {

    fetch("http://localhost:8080/admin/addStudent", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: document.getElementById("sname").value,
            studentClass: document.getElementById("sclass").value,
            parentUsername: document.getElementById("parent").value
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("msg1").innerText = "Student Added Successfully!";
    })
    .catch(err => {
        document.getElementById("msg1").innerText = "Error Adding Student";
    });
}


// ➕ Add Teacher
function addTeacher() {

    fetch("http://localhost:8080/admin/addTeacher", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: document.getElementById("tname").value,
            subject: document.getElementById("subject").value
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("msg2").innerText = "Teacher Added Successfully!";
    })
    .catch(err => {
        document.getElementById("msg2").innerText = "Error Adding Teacher";
    });
}

</script>

</body>
</html>
